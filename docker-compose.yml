# Straylight Docker Compose Setup

services:
  redis:
    image: redis:alpine
    container_name: straylight-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    restart: unless-stopped

  straylight:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: straylight
    env_file:
      - .env
    volumes:
      - ./models:/app/models:ro
      - ./shared:/app/shared:ro
      - ./core/cass_prompt.txt:/app/cass_prompt.txt:ro
      - ./scripts:/app/scripts:ro
      - ./exemplars.jsonl:/app/exemplars.jsonl:ro
    devices:
      - /dev/snd:/dev/snd:rwm
    network_mode: host
    user: "1000:1000"
    restart: unless-stopped
    # Add healthcheck to verify the container is running properly
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'Checking if service is running'"]
      interval: 30s
      timeout: 10s
      retries: 3